<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>不思議のダンジョン風ミニゲーム（画像使用版）</title>
<style>
  body { background:#111; color:#eee; font-family: system-ui, "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif; display:flex; flex-direction:column; align-items:center; padding:20px; }
  canvas { image-rendering: pixelated; border:4px solid #222; background:#000; }
  #hud { margin-top:10px; width:640px; display:flex; justify-content:space-between; }
  .info { background:#1a1a1a; padding:8px 12px; border-radius:6px; }
  .legend { margin-top:8px; font-size:13px; color:#ccc; }
  .legend span { display:inline-block; margin-right:12px; }
</style>
</head>
<body>
<h3>不思議のダンジョン風ミニゲーム（画像版）</h3>
<canvas id="game" width="640" height="640"></canvas>
<div id="hud">
  <div class="info" id="status">HP: 10 | Floor: 1</div>
  <div class="info" id="message">矢印キーで移動。階段を目指せ。</div>
</div>
<div class="legend">
  <span>🟫 壁</span>
  <span>⬛ 床</span>
  <span style="color:#ff6666">🟥 敵（slyme1.png）</span>
  <span style="color:#ffff66">🟨 階段（kaidan.png）</span>
  <span style="color:#66ff66">🟩 回復薬</span>
  <span style="color:#66ccff">🟦 主人公（fighter.png）</span>
</div>

<script>
/* --- 基本設定 --- */
const TILE_SIZE = 32;
const MAP_W = 20;
const MAP_H = 20;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = MAP_W * TILE_SIZE;
canvas.height = MAP_H * TILE_SIZE;
ctx.imageSmoothingEnabled = false; // ピクセルアート補間を無効化

const TILE = { WALL:0, FLOOR:1, STAIRS:2, POTION:3 };

/* --- 画像アセット（1024x1024 の単一画像を縮小して使用） --- */
const fighterImg = new Image();
fighterImg.src = 'fighter.png';
const enemyImg = new Image();
enemyImg.src = 'slyme1.png';
const stairsImg = new Image();
stairsImg.src = 'kaidan.png';

let assetsLoaded = 0;
[fighterImg, enemyImg, stairsImg].forEach(img=>{
  img.onload = () => { assetsLoaded++; startIfReady(); };
  img.onerror = () => { console.warn(img.src + ' の読み込みに失敗しました。'); startIfReady(); };
});

/* --- ゲーム状態 --- */
let floor = 1;
let map = [];
let player = { x:0, y:0, hp:10, maxHp:10 };
let enemies = [];
let messages = [];
let gameOver = false;

/* --- マップ生成（drunkard walk） --- */
function generateMap() {
  map = Array.from({length:MAP_H}, ()=>Array(MAP_W).fill(TILE.WALL));
  const walkCount = 600;
  let x = Math.floor(MAP_W/2), y = Math.floor(MAP_H/2);
  map[y][x] = TILE.FLOOR;
  for (let i=0;i<walkCount;i++){
    const dir = Math.floor(Math.random()*4);
    if (dir===0 && x>1) x--;
    if (dir===1 && x<MAP_W-2) x++;
    if (dir===2 && y>1) y--;
    if (dir===3 && y<MAP_H-2) y++;
    map[y][x] = TILE.FLOOR;
  }
  player.x = x; player.y = y;
  placeTileRandom(TILE.STAIRS, 1);
  placeTileRandom(TILE.POTION, 3 + Math.floor(floor/2));
  enemies = [];
  const enemyCount = 3 + Math.floor(floor/2);
  for (let i=0;i<enemyCount;i++) spawnEnemy();
}

function placeTileRandom(tileType, count) {
  let placed = 0;
  while (placed < count) {
    const rx = Math.floor(Math.random()*MAP_W);
    const ry = Math.floor(Math.random()*MAP_H);
    if (map[ry][rx] === TILE.FLOOR && !(rx===player.x && ry===player.y)) {
      map[ry][rx] = tileType;
      placed++;
    }
  }
}

function spawnEnemy() {
  for (let tries=0; tries<200; tries++){
    const rx = Math.floor(Math.random()*MAP_W);
    const ry = Math.floor(Math.random()*MAP_H);
    if (map[ry][rx] === TILE.FLOOR && !(rx===player.x && ry===player.y)) {
      enemies.push({x:rx,y:ry,hp:3 + Math.floor(floor/2)});
      return;
    }
  }
}

/* --- 描画 --- */
function draw() {
  // タイル描画
  for (let y=0;y<MAP_H;y++){
    for (let x=0;x<MAP_W;x++){
      const t = map[y][x];
      if (t === TILE.WALL) fillRect(x,y,'#4b4b4b');
      else if (t === TILE.FLOOR) fillRect(x,y,'#0b0b0b');
      else if (t === TILE.POTION) { fillRect(x,y,'#0b0b0b'); drawRect(x,y,'#66ff66'); }
      else if (t === TILE.STAIRS) {
        fillRect(x,y,'#0b0b0b');
        if (stairsImg.complete && stairsImg.naturalWidth !== 0) {
          ctx.drawImage(stairsImg, 0, 0, stairsImg.width, stairsImg.height, x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        } else {
          drawRect(x,y,'#ffff66');
        }
      }
    }
  }
  // 敵描画（画像があれば縮小して描画）
  for (const e of enemies) {
    if (enemyImg.complete && enemyImg.naturalWidth !== 0) {
      ctx.drawImage(enemyImg, 0, 0, enemyImg.width, enemyImg.height, e.x*TILE_SIZE, e.y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
    } else {
      drawCircle(e.x,e.y,'#ff6666');
    }
  }
  // 主人公描画（画像があれば縮小して描画）
  if (fighterImg.complete && fighterImg.naturalWidth !== 0) {
    ctx.drawImage(fighterImg, 0, 0, fighterImg.width, fighterImg.height, player.x*TILE_SIZE, player.y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
  } else {
    drawCircle(player.x, player.y, '#66ccff');
  }

  // HUD
  document.getElementById('status').textContent = `HP: ${player.hp}/${player.maxHp} | Floor: ${floor} | Enemies: ${enemies.length}`;
  const msg = messages.length ? messages[messages.length-1] : '矢印キーで移動。階段を目指せ。';
  document.getElementById('message').textContent = msg;
}

function fillRect(x,y,color){
  ctx.fillStyle = color;
  ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
}
function drawRect(x,y,color){
  ctx.fillStyle = color;
  ctx.fillRect(x*TILE_SIZE+6, y*TILE_SIZE+6, TILE_SIZE-12, TILE_SIZE-12);
}
function drawCircle(x,y,color){
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x*TILE_SIZE + TILE_SIZE/2, y*TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2 - 4, 0, Math.PI*2);
  ctx.fill();
}

/* --- ゲームロジック --- */
function inBounds(x,y){ return x>=0 && x<MAP_W && y>=0 && y<MAP_H; }

function tryMovePlayer(dx,dy) {
  if (gameOver) return;
  const nx = player.x + dx, ny = player.y + dy;
  if (!inBounds(nx,ny)) return;
  if (map[ny][nx] === TILE.WALL) { messages.push('壁だ。'); return; }
  const enemy = enemies.find(e=>e.x===nx && e.y===ny);
  if (enemy) {
    attackEnemy(enemy);
  } else {
    player.x = nx; player.y = ny;
    const tile = map[ny][nx];
    if (tile === TILE.POTION) {
      player.hp = Math.min(player.maxHp, player.hp + 5);
      map[ny][nx] = TILE.FLOOR;
      messages.push('回復薬を拾った。HP回復！');
    } else if (tile === TILE.STAIRS) {
      floor++;
      messages.push(`階段を下りた。フロア ${floor} へ。`);
      player.hp = Math.min(player.maxHp, player.hp + 2);
      generateMap();
    } else {
      messages.push('移動した。');
    }
  }
  enemiesTurn();
  checkPlayerDead();
  draw();
}

function attackEnemy(enemy) {
  const dmg = 2 + Math.floor(Math.random()*2);
  enemy.hp -= dmg;
  messages.push(`敵に ${dmg} ダメージ！`);
  if (enemy.hp <= 0) {
    messages.push('敵を倒した！');
    enemies = enemies.filter(e=>e!==enemy);
  } else {
    if (Math.random() < 0.6) {
      const edmg = 1 + Math.floor(Math.random()*2);
      player.hp -= edmg;
      messages.push(`敵の反撃で ${edmg} ダメージ！`);
    }
  }
}

function enemiesTurn() {
  for (const e of enemies) {
    const dx = player.x - e.x, dy = player.y - e.y;
    if (Math.abs(dx) + Math.abs(dy) === 1) {
      const dmg = 1 + Math.floor(Math.random()*2);
      player.hp -= dmg;
      messages.push(`敵に ${dmg} ダメージを受けた。`);
    } else {
      const dirs = [[1,0],[-1,0],[0,1],[0,-1],[0,0]];
      const [mx,my] = dirs[Math.floor(Math.random()*dirs.length)];
      const nx = e.x + mx, ny = e.y + my;
      if (inBounds(nx,ny) && map[ny][nx] === TILE.FLOOR && !(nx===player.x && ny===player.y) && !enemies.some(o=>o.x===nx && o.y===ny)) {
        e.x = nx; e.y = ny;
      }
    }
  }
}

function checkPlayerDead() {
  if (player.hp <= 0) {
    gameOver = true;
    messages.push('あなたは倒れた…ゲームオーバー。リロードで再挑戦。');
    draw();
  }
}

/* --- 入力 --- */
window.addEventListener('keydown', (e)=>{
  if (gameOver) return;
  const key = e.key;
  if (key === 'ArrowUp' || key === 'w' || key === 'W') { tryMovePlayer(0,-1); e.preventDefault(); }
  else if (key === 'ArrowDown' || key === 's' || key === 'S') { tryMovePlayer(0,1); e.preventDefault(); }
  else if (key === 'ArrowLeft' || key === 'a' || key === 'A') { tryMovePlayer(-1,0); e.preventDefault(); }
  else if (key === 'ArrowRight' || key === 'd' || key === 'D') { tryMovePlayer(1,0); e.preventDefault(); }
  else if (key === ' ') { enemiesTurn(); messages.push('待機した。'); checkPlayerDead(); draw(); e.preventDefault(); }
});

/* --- 初期化（画像読み込み待ち） --- */
function startIfReady(){
  // 3つの画像を待つ
  if (assetsLoaded >= 3) {
    generateMap();
    draw();
  }
}
// 画像が読み込まれない場合に強制開始したい場合は下のコメントを外してください。
// generateMap(); draw();
</script>
</body>
</html>
