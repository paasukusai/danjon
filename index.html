<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>不思議のダンジョン風ミニゲーム（視界：周囲4マス）</title>
<style>
  body { background:#111; color:#eee; font-family: system-ui, "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif; display:flex; flex-direction:column; align-items:center; padding:20px; }
  canvas { image-rendering: pixelated; border:4px solid #222; background:#000; }
  #hud { margin-top:10px; width:640px; display:flex; justify-content:space-between; }
  .info { background:#1a1a1a; padding:8px 12px; border-radius:6px; }
  .legend { margin-top:8px; font-size:13px; color:#ccc; }
  .legend span { display:inline-block; margin-right:12px; }
</style>
</head>
<body>
<h3>不思議のダンジョン風ミニゲーム（視界：周囲4マス）</h3>
<canvas id="game" width="640" height="640"></canvas>
<div id="hud">
  <div class="info" id="status">HP: 10/10 | Floor: 1</div>
  <div class="info" id="message">矢印キーで移動。周囲4マスが見える。</div>
</div>
<div class="legend">
  <span>🟫 壁</span>
  <span>⬛ 床</span>
  <span style="color:#ff6666">🟥 敵（slyme1.png）</span>
  <span style="color:#ffff66">🟨 階段（kaidan.png）</span>
  <span style="color:#66ff66">🟩 回復薬</span>
  <span style="color:#66ccff">🟦 主人公（fighter.png）</span>
</div>

<script>
/* --- 基本設定 --- */
const TILE_SIZE = 32;
const MAP_W = 20;
const MAP_H = 20;
const VIS_RADIUS = 4; // 主人公の周り何マス見えるか（Chebyshev距離）
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = MAP_W * TILE_SIZE;
canvas.height = MAP_H * TILE_SIZE;
ctx.imageSmoothingEnabled = false;

const TILE = { WALL:0, FLOOR:1, STAIRS:2, POTION:3 };

/* --- 画像アセット（任意：同フォルダに配置） --- */
const fighterImg = new Image(); fighterImg.src = 'fighter.png';
const enemyImg   = new Image(); enemyImg.src   = 'slyme1.png';
const stairsImg  = new Image(); stairsImg.src  = 'kaidan.png';

let assetsLoaded = 0;
[fighterImg, enemyImg, stairsImg].forEach(img=>{
  img.onload = () => { assetsLoaded++; startIfReady(); };
  img.onerror = () => { console.warn(img.src + ' の読み込みに失敗しました。'); startIfReady(); };
});

/* --- ゲーム状態 --- */
let floor = 1;
let map = [];
// 視界管理：seen は一度でも見たタイル、revealProgress はフェードアニメ用（0..1）
let seen = [];
let revealProgress = [];
let player = { x:0, y:0, hp:10, maxHp:10 };
let enemies = [];
let messages = [];
let gameOver = false;

/* --- マップ生成（drunkard walk） --- */
function generateMap() {
  map = Array.from({length:MAP_H}, ()=>Array(MAP_W).fill(TILE.WALL));
  seen = Array.from({length:MAP_H}, ()=>Array(MAP_W).fill(false));
  revealProgress = Array.from({length:MAP_H}, ()=>Array(MAP_W).fill(0));
  const walkCount = 600;
  let x = Math.floor(MAP_W/2), y = Math.floor(MAP_H/2);
  map[y][x] = TILE.FLOOR;
  for (let i=0;i<walkCount;i++){
    const dir = Math.floor(Math.random()*4);
    if (dir===0 && x>1) x--;
    if (dir===1 && x<MAP_W-2) x++;
    if (dir===2 && y>1) y--;
    if (dir===3 && y<MAP_H-2) y++;
    map[y][x] = TILE.FLOOR;
  }
  player.x = x; player.y = y;
  placeTileRandom(TILE.STAIRS, 1);
  placeTileRandom(TILE.POTION, 3 + Math.floor(floor/2));
  enemies = [];
  const enemyCount = 3 + Math.floor(floor/2);
  for (let i=0;i<enemyCount;i++) spawnEnemy();

  // 初期視界を開く
  revealAround(player.x, player.y);
}

function placeTileRandom(tileType, count) {
  let placed = 0;
  while (placed < count) {
    const rx = Math.floor(Math.random()*MAP_W);
    const ry = Math.floor(Math.random()*MAP_H);
    if (map[ry][rx] === TILE.FLOOR && !(rx===player.x && ry===player.y)) {
      map[ry][rx] = tileType;
      placed++;
    }
  }
}

function spawnEnemy() {
  for (let tries=0; tries<200; tries++){
    const rx = Math.floor(Math.random()*MAP_W);
    const ry = Math.floor(Math.random()*MAP_H);
    if (map[ry][rx] === TILE.FLOOR && !(rx===player.x && ry===player.y)) {
      enemies.push({x:rx,y:ry,hp:3 + Math.floor(floor/2)});
      return;
    }
  }
}

/* --- 視界（FOV）とフェード --- */
// Chebyshev距離（正方形範囲）で判定
function inVisRange(px,py,x,y) {
  return Math.max(Math.abs(px-x), Math.abs(py-y)) <= VIS_RADIUS;
}

// プレイヤー周囲を「見える」状態にしてフェードインを開始
function revealAround(px,py) {
  for (let y=0;y<MAP_H;y++){
    for (let x=0;x<MAP_W;x++){
      if (inVisRange(px,py,x,y)) {
        // 新しく見えるタイルは revealProgress を 0 にしてアニメ開始
        if (revealProgress[y][x] === 0) {
          revealProgress[y][x] = 0.001; // 0 を使うと判定で未見と同じ扱いになるため微小値
        }
        seen[y][x] = true;
      }
    }
  }
  // アニメーションを開始
  animateReveal();
}

// フェードアニメ：revealProgress を 0->1 にする（簡易）
let animating = false;
function animateReveal() {
  if (animating) return;
  animating = true;
  const step = 1/8; // フレーム数（8フレームでフェード）
  function stepAnim() {
    let any = false;
    for (let y=0;y<MAP_H;y++){
      for (let x=0;x<MAP_W;x++){
        if (revealProgress[y][x] > 0 && revealProgress[y][x] < 1) {
          revealProgress[y][x] = Math.min(1, revealProgress[y][x] + step);
          any = true;
        }
      }
    }
    draw(); // 再描画
    if (any) requestAnimationFrame(stepAnim);
    else animating = false;
  }
  requestAnimationFrame(stepAnim);
}

/* --- 描画 --- */
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (let y=0;y<MAP_H;y++){
    for (let x=0;x<MAP_W;x++){
      const t = map[y][x];
      const prog = revealProgress[y][x]; // 0..1
      const isSeen = seen[y][x];
      const isVisible = inVisRange(player.x, player.y, x, y);

      // 見えていない（未探索）タイルは真っ黒
      if (!isSeen) {
        ctx.fillStyle = '#000';
        ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        continue;
      }

      // 見えたことがあるタイルは描画するが、現在視界外なら暗く表示
      if (!isVisible) {
        // 暗い床/壁
        if (t === TILE.WALL) ctx.fillStyle = '#2a2a2a';
        else ctx.fillStyle = '#050505';
        ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        // アイテムや階段は薄く表示
        if (t === TILE.POTION) drawDimRect(x,y,'#2f7f2f');
        if (t === TILE.STAIRS) drawDimRect(x,y,'#7f7f2f');
        continue;
      }

      // 現在視界内：フェード進行度に応じてアルファで描画（0..1）
      const alpha = Math.min(1, prog || 1);
      // 床/壁
      if (t === TILE.WALL) {
        drawWithAlpha(()=>{ ctx.fillStyle = '#4b4b4b'; ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE); }, alpha);
      } else {
        drawWithAlpha(()=>{ ctx.fillStyle = '#0b0b0b'; ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE); }, alpha);
      }
      // アイテム / 階段（画像があれば画像で、なければ色ブロック）
      if (t === TILE.POTION) {
        if (stairsImg && false) {} // placeholder
        drawWithAlpha(()=>{ drawRect(x,y,'#66ff66'); }, alpha);
      } else if (t === TILE.STAIRS) {
        if (stairsImg.complete && stairsImg.naturalWidth !== 0) {
          // 画像を縮小して描画（alpha対応）
          drawWithAlpha(()=>{ ctx.drawImage(stairsImg, 0, 0, stairsImg.width, stairsImg.height, x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE); }, alpha);
        } else {
          drawWithAlpha(()=>{ drawRect(x,y,'#ffff66'); }, alpha);
        }
      }
    }
  }

  // 敵（視界内のみフル表示、視界外は見えていれば暗く表示）
  for (const e of enemies) {
    const isSeen = seen[e.y][e.x];
    const isVisible = inVisRange(player.x, player.y, e.x, e.y);
    if (!isSeen) continue;
    if (isVisible) {
      if (enemyImg.complete && enemyImg.naturalWidth !== 0) {
        ctx.drawImage(enemyImg, 0, 0, enemyImg.width, enemyImg.height, e.x*TILE_SIZE, e.y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
      } else {
        drawCircle(e.x,e.y,'#ff6666');
      }
    } else {
      // 視界外だが一度見た敵は暗く表示（円を暗めに）
      drawCircle(e.x,e.y,'#5a2a2a');
    }
  }

  // 主人公は常に表示（視界内）
  if (fighterImg.complete && fighterImg.naturalWidth !== 0) {
    ctx.drawImage(fighterImg, 0, 0, fighterImg.width, fighterImg.height, player.x*TILE_SIZE, player.y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
  } else {
    drawCircle(player.x, player.y, '#66ccff');
  }

  // HUD
  document.getElementById('status').textContent = `HP: ${player.hp}/${player.maxHp} | Floor: ${floor} | Enemies: ${enemies.length}`;
  const msg = messages.length ? messages[messages.length-1] : '矢印キーで移動。周囲4マスが見える。';
  document.getElementById('message').textContent = msg;
}

function drawWithAlpha(drawFn, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  drawFn();
  ctx.restore();
}
function drawDimRect(x,y,color){
  ctx.fillStyle = color;
  ctx.fillRect(x*TILE_SIZE+6, y*TILE_SIZE+6, TILE_SIZE-12, TILE_SIZE-12);
}
function fillRect(x,y,color){
  ctx.fillStyle = color;
  ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
}
function drawRect(x,y,color){
  ctx.fillStyle = color;
  ctx.fillRect(x*TILE_SIZE+6, y*TILE_SIZE+6, TILE_SIZE-12, TILE_SIZE-12);
}
function drawCircle(x,y,color){
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x*TILE_SIZE + TILE_SIZE/2, y*TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2 - 4, 0, Math.PI*2);
  ctx.fill();
}

/* --- ゲームロジック --- */
function inBounds(x,y){ return x>=0 && x<MAP_W && y>=0 && y<MAP_H; }

function tryMovePlayer(dx,dy) {
  if (gameOver) return;
  const nx = player.x + dx, ny = player.y + dy;
  if (!inBounds(nx,ny)) return;
  if (map[ny][nx] === TILE.WALL) { messages.push('壁だ。'); draw(); return; }
  const enemy = enemies.find(e=>e.x===nx && e.y===ny);
  if (enemy) {
    attackEnemy(enemy);
  } else {
    player.x = nx; player.y = ny;
    const tile = map[ny][nx];
    if (tile === TILE.POTION) {
      if (player.hp === player.maxHp) {
        player.maxHp += 1;
        player.hp = player.maxHp;
        messages.push('満タンだったので体力上限が1上がった！');
      } else {
        player.hp = Math.min(player.maxHp, player.hp + 5);
        messages.push('回復薬を拾った。HP回復！');
      }
      map[ny][nx] = TILE.FLOOR;
    } else if (tile === TILE.STAIRS) {
      floor++;
      messages.push(`階段を下りた。フロア ${floor} へ。`);
      player.hp = Math.min(player.maxHp, player.hp + 2);
      generateMap();
      draw();
      return;
    } else {
      messages.push('移動した。');
    }
  }
  // 視界更新（移動すると周囲が見えるようになる）
  revealAround(player.x, player.y);

  enemiesTurn();
  checkPlayerDead();
  draw();
}

function attackEnemy(enemy) {
  const dmg = 2 + Math.floor(Math.random()*2);
  enemy.hp -= dmg;
  messages.push(`敵に ${dmg} ダメージ！`);
  if (enemy.hp <= 0) {
    messages.push('敵を倒した！');
    enemies = enemies.filter(e=>e!==enemy);
  } else {
    if (Math.random() < 0.6) {
      const edmg = 1 + Math.floor(Math.random()*2);
      player.hp -= edmg;
      messages.push(`敵の反撃で ${edmg} ダメージ！`);
    }
  }
}

function enemiesTurn() {
  for (const e of enemies) {
    const dx = player.x - e.x, dy = player.y - e.y;
    if (Math.abs(dx) + Math.abs(dy) === 1) {
      const dmg = 1 + Math.floor(Math.random()*2);
      player.hp -= dmg;
      messages.push(`敵に ${dmg} ダメージを受けた。`);
    } else {
      const dirs = [[1,0],[-1,0],[0,1],[0,-1],[0,0]];
      const [mx,my] = dirs[Math.floor(Math.random()*dirs.length)];
      const nx = e.x + mx, ny = e.y + my;
      if (inBounds(nx,ny) && map[ny][nx] === TILE.FLOOR && !(nx===player.x && ny===player.y) && !enemies.some(o=>o.x===nx && o.y===ny)) {
        e.x = nx; e.y = ny;
      }
    }
  }
}

function checkPlayerDead() {
  if (player.hp <= 0) {
    gameOver = true;
    messages.push('あなたは倒れた…ゲームオーバー。リロードで再挑戦。');
    draw();
  }
}

/* --- 入力 --- */
window.addEventListener('keydown', (e)=>{
  if (gameOver) return;
  const key = e.key;
  if (key === 'ArrowUp' || key === 'w' || key === 'W') { tryMovePlayer(0,-1); e.preventDefault(); }
  else if (key === 'ArrowDown' || key === 's' || key === 'S') { tryMovePlayer(0,1); e.preventDefault(); }
  else if (key === 'ArrowLeft' || key === 'a' || key === 'A') { tryMovePlayer(-1,0); e.preventDefault(); }
  else if (key === 'ArrowRight' || key === 'd' || key === 'D') { tryMovePlayer(1,0); e.preventDefault(); }
  else if (key === ' ') { enemiesTurn(); messages.push('待機した。'); revealAround(player.x, player.y); checkPlayerDead(); draw(); e.preventDefault(); }
});

/* --- 初期化（画像読み込み待ち） --- */
function startIfReady(){
  // 3つの画像を待つ（ローカルで無ければ警告しても開始）
  if (assetsLoaded >= 3) {
    generateMap();
    draw();
  }
}
// 画像が読み込まれない場合に強制開始したい場合は下のコメントを外してください。
// generateMap(); draw();
</script>
</body>
</html>
