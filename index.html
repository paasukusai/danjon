<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>勇者、潜ります</title>
<style>
  :root{
    --bg:#0f0f10;
    --panel:#141414;
    --accent:#66cc66;
    --muted:#9aa0a6;
    --btn:#222;
    --btn-press:#111;
    --white:#eee;
  }
  html,body{height:100%;margin:0;}
  body {
    background:var(--bg);
    color:var(--white);
    font-family: system-ui, "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    padding:12px;
    box-sizing:border-box;
  }

  /* Game area */
  .gameWrap { width:100%; max-width:640px; display:flex; flex-direction:column; align-items:center; gap:8px; position:relative; }
  canvas { image-rendering: pixelated; background:#000; border:4px solid #222; width:100%; height:auto; max-height:80vh; display:block; }

  /* HUD: status と message を別行に */
  #hud { width:100%; max-width:640px; display:flex; flex-direction:column; gap:8px; }
  .info { background:var(--panel); padding:8px 12px; border-radius:8px; text-align:left; border:1px solid #222; color:var(--white); font-size:14px; }
  #status { display:flex; justify-content:space-between; align-items:center; }
  #message { background:#111; color:#ddd; font-weight:600; }

  /* Controller (Game Boy like) */
  .controller {
    width:100%;
    max-width:640px;
    background:linear-gradient(180deg,#0e0e0e,#141414);
    border:3px solid #222;
    border-radius:14px;
    padding:12px;
    box-sizing:border-box;
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:space-between;
    touch-action: manipulation;
    -webkit-user-select:none;
    user-select:none;
  }

  /* D-pad: widened horizontally for easier presses */
  .dpad {
    width:180px;
    height:140px;
    position:relative;
    display:inline-block;
  }
  .dpad button {
    position:absolute;
    width:56px;
    height:56px;
    border-radius:10px;
    background:var(--btn);
    border:2px solid #2a2a2a;
    color:var(--white);
    font-weight:700;
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad button:active { background:var(--btn-press); transform:translateY(1px); }

  .dpad .up    { left:62px; top:0; }
  .dpad .down  { left:62px; bottom:0; top:auto; }
  .dpad .left  { left:0; top:42px; }
  .dpad .right { left:124px; top:42px; }

  /* Buttons A/B */
  .buttons {
    display:flex;
    flex-direction:column;
    gap:12px;
    align-items:center;
    justify-content:center;
    padding-right:8px;
  }
  .buttons .row { display:flex; gap:12px; }
  .btn-large {
    width:64px;
    height:64px;
    border-radius:50%;
    background:linear-gradient(180deg,#2b2b2b,#1b1b1b);
    border:3px solid #2a2a2a;
    color:var(--white);
    font-weight:800;
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-large:active { background:#111; transform:translateY(1px); }

  .smallBtns { display:none; }

  /* Logo overlay */
  .logoOverlay {
    position:absolute;
    left:0; top:0;
    width:100%; height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(0deg, rgba(0,0,0,0.6), rgba(0,0,0,0.2));
    z-index:40;
    transition:opacity 300ms ease;
  }
  .logoOverlay.hidden { opacity:0; pointer-events:none; }
  .logoBox {
    width:80%;
    max-width:520px;
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    background:transparent;
  }
  .logoBox img { width:100%; height:100%; object-fit:contain; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.6); }

  /* Game over overlay */
  .gameOverOverlay {
    position:absolute;
    left:0; top:0;
    width:100%; height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(0deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
    z-index:41;
    transition:opacity 300ms ease;
  }
  .gameOverOverlay.hidden { opacity:0; pointer-events:none; }
  .gameOverBox {
    width:80%;
    max-width:420px;
    background:var(--panel);
    border:3px solid #cc3333;
    border-radius:12px;
    padding:24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    text-align:center;
  }
  .gameOverBox h2 {
    margin:0;
    font-size:24px;
    color:#ff6666;
  }
  .gameOverStats {
    display:flex;
    flex-direction:column;
    gap:8px;
    width:100%;
  }
  .gameOverStats div {
    font-size:16px;
    color:var(--white);
  }
  .gameOverStats .floor {
    color:var(--accent);
    font-weight:700;
  }
  .gameOverStats .rating {
    color:#ffdd66;
    font-weight:700;
    font-size:18px;
  }
  #retryBtn {
    padding:12px 32px;
    font-size:16px;
    font-weight:700;
    color:var(--white);
    background:#cc3333;
    border:2px solid #ff6666;
    border-radius:8px;
    cursor:pointer;
    transition:all 200ms ease;
    -webkit-tap-highlight-color: transparent;
  }
  #retryBtn:hover {
    background:#ff6666;
    transform:translateY(-2px);
  }
  #retryBtn:active {
    background:#cc3333;
    transform:translateY(0);
  }

  /* Mobile friendly spacing */
  @media (max-width:420px){
    .dpad { width:150px; height:110px; }
    .dpad button { width:44px; height:44px; border-radius:8px; font-size:16px; }
    .dpad .up { left:53px; }
    .dpad .down { left:53px; }
    .dpad .right { left:106px; }
    .btn-large { width:56px; height:56px; font-size:16px; }
    .controller { padding:10px; gap:8px; }
    .logoBox { max-width:360px; width:86%; }
  }
</style>
</head>
<body>
<div class="gameWrap" id="gameWrap">
  <div style="width:100%; display:flex; justify-content:center; position:relative;">
    <canvas id="game" width="640" height="640" aria-label="ゲーム画面"></canvas>

    <!-- Logo overlay shown at game start -->
    <div id="logoOverlay" class="logoOverlay" role="dialog" aria-label="ゲームロゴ">
      <div class="logoBox" id="logoBox">
        <img id="logoImg" src="logo.png" alt="ゲームロゴ">
      </div>
    </div>

    <!-- Game over overlay -->
    <div id="gameOverOverlay" class="gameOverOverlay hidden" role="dialog" aria-label="ゲームオーバー">
      <div class="gameOverBox">
        <h2>ゲームオーバー</h2>
        <div class="gameOverStats">
          <div class="floor">到達フロア: <span id="finalFloor">1</span></div>
          <div class="rating">評価: <span id="finalRating">初心者</span></div>
        </div>
        <button id="retryBtn">再挑戦</button>
      </div>
    </div>
  </div>

  <!-- HUD: status と message を別行で表示 -->
  <div id="hud">
    <div id="status" class="info">
      <div id="hpText">HP: 10/10</div>
      <div id="floorText">Floor: 1</div>
      <div id="lvText">Lv: 1</div>
    </div>
    <div id="message" class="info">タッチで操作。Aで攻撃、Bで待機。</div>
  </div>

  <!-- On-screen controller -->
  <div class="controller" role="application" aria-label="ゲームコントローラ">
    <div class="dpad" aria-hidden="false">
      <button class="up" data-action="up" aria-label="上">▲</button>
      <button class="down" data-action="down" aria-label="下">▼</button>
      <button class="left" data-action="left" aria-label="左">◀</button>
      <button class="right" data-action="right" aria-label="右">▶</button>
    </div>

    <div class="buttons" aria-hidden="false">
      <div class="row">
        <button id="btnB" class="btn-large" data-action="wait" aria-label="B ボタン">B</button>
        <div style="width:8px"></div>
        <button id="btnA" class="btn-large" data-action="attack" aria-label="A ボタン">A</button>
      </div>
    </div>
  </div>
</div>

<script>
/* --- ロゴ表示の挙動 ---
   - ページ読み込み時に logoOverlay を表示
   - ユーザーが最初に操作（タッチ/クリック/キー）したらオーバーレイをフェードアウトしてゲーム開始（BGM自動開始）
   - もしくは 3 秒後に自動でフェードアウト（ユーザーが操作しない場合でも見せる）
*/

/* --- Canvas / game setup --- */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const TILE_SIZE = 32;
const MAP_W = 20;
const MAP_H = 20;
const VIS_RADIUS = 4;
const logoOverlay = document.getElementById('logoOverlay');

const TILE = { WALL:0, FLOOR:1, STAIRS:2, POTION:3 };

/* Assets */
const assetFiles = {
  fighter: 'fighter.png',
  stairs: 'kaidan.png',
  potion: 'potion.png',
  enemies: [
    'slyme1.png','goblin.png','owk.png','wolf.png','spider.png',
    'skelton.png','mino.png','golem.png','demon.png','enem.png'
  ]
};
const fighterImg = new Image(); fighterImg.src = assetFiles.fighter;
const stairsImg  = new Image(); stairsImg.src  = assetFiles.stairs;
const potionImg  = new Image(); potionImg.src  = assetFiles.potion;
const enemyImgs  = assetFiles.enemies.map(src => { const i = new Image(); i.src = src; return i; });

let assetsLoaded = 0;
const allImgs = [fighterImg, stairsImg, potionImg, ...enemyImgs];
allImgs.forEach(img=>{
  img.onload = () => { assetsLoaded++; startIfReady(); };
  img.onerror = () => { assetsLoaded++; startIfReady(); };
});

/* Audio */
const bgm = new Audio('bgm.mp3'); bgm.loop = true; bgm.preload = 'auto';
const gameoverAudio = new Audio('gameover.mp3'); gameoverAudio.preload = 'auto';
const sfx = {
  hpup: new Audio('hpup.wav'),
  kaishin: new Audio('kaishin.wav'),
  potion: new Audio('potion.wav'),
  atkup: new Audio('atkup.wav'),
  tekiatk: new Audio('tekiatk.wav'),
  kaidan: new Audio('kaidan.wav'),
  kougeki: new Audio('kougeki.wav')
};
Object.values(sfx).forEach(a=>{ a.preload='auto'; });

let bgmAutoStarted = false;

/* Game state */
let floor = 1;
let map = [];
let seen = [];
let revealProgress = [];
let player = { x:0, y:0, hp:10, maxHp:10, baseAtk:1, randomAtk:1 };
let enemies = [];
let killCount = 0;
let messages = [];
let gameOver = false;

/* Enemy attack scaling */
const enemyBaseAtk = 1;
function enemyAtkForFloor(floorNumber) {
  const step = Math.floor((floorNumber - 1) / 10);
  return enemyBaseAtk + step * 5;
}

/* Growth threshold */
function nextThresholdValue() { return 10 + Math.floor(Math.random() * 3); }
let nextGrowthThreshold = nextThresholdValue();

/* Map generation */
function generateMap() {
  map = Array.from({length:MAP_H}, ()=>Array(MAP_W).fill(TILE.WALL));
  seen = Array.from({length:MAP_H}, ()=>Array(MAP_W).fill(false));
  revealProgress = Array.from({length:MAP_H}, ()=>Array(MAP_W).fill(0));
  const walkCount = 600;
  let x = Math.floor(MAP_W/2), y = Math.floor(MAP_H/2);
  map[y][x] = TILE.FLOOR;
  for (let i=0;i<walkCount;i++){
    const dir = Math.floor(Math.random()*4);
    if (dir===0 && x>1) x--;
    if (dir===1 && x<MAP_W-2) x++;
    if (dir===2 && y>1) y--;
    if (dir===3 && y<MAP_H-2) y++;
    map[y][x] = TILE.FLOOR;
  }
  player.x = x; player.y = y;
  placeTileRandom(TILE.STAIRS, 1);
  placeTileRandom(TILE.POTION, 3 + Math.floor(floor/2));
  enemies = [];
  const enemyCount = 3 + Math.floor(floor/2);
  for (let i=0;i<enemyCount;i++) spawnEnemy();
  revealAround(player.x, player.y);
}

function placeTileRandom(tileType, count) {
  let placed = 0;
  while (placed < count) {
    const rx = Math.floor(Math.random()*MAP_W);
    const ry = Math.floor(Math.random()*MAP_H);
    if (map[ry][rx] === TILE.FLOOR && !(rx===player.x && ry===player.y)) {
      map[ry][rx] = tileType;
      placed++;
    }
  }
}

function spawnEnemy() {
  for (let tries=0; tries<200; tries++){
    const rx = Math.floor(Math.random()*MAP_W);
    const ry = Math.floor(Math.random()*MAP_H);
    if (map[ry][rx] === TILE.FLOOR && !(rx===player.x && ry===player.y)) {
      enemies.push({x:rx,y:ry,hp:3 + Math.floor(floor/2), chasing:false});
      return;
    }
  }
}

/* Visibility */
function inVisRange(px,py,x,y) {
  return Math.max(Math.abs(px-x), Math.abs(py-y)) <= VIS_RADIUS;
}
function revealAround(px,py) {
  for (let y=0;y<MAP_H;y++){
    for (let x=0;x<MAP_W;x++){
      if (inVisRange(px,py,x,y)) {
        if (revealProgress[y][x] === 0) revealProgress[y][x] = 0.001;
        seen[y][x] = true;
      }
    }
  }
  animateReveal();
}
let animating = false;
function animateReveal() {
  if (animating) return;
  animating = true;
  const step = 1/8;
  function stepAnim() {
    let any = false;
    for (let y=0;y<MAP_H;y++){
      for (let x=0;x<MAP_W;x++){
        if (revealProgress[y][x] > 0 && revealProgress[y][x] < 1) {
          revealProgress[y][x] = Math.min(1, revealProgress[y][x] + step);
          any = true;
        }
      }
    }
    draw();
    if (any) requestAnimationFrame(stepAnim);
    else animating = false;
  }
  requestAnimationFrame(stepAnim);
}

/* Enemy image selection */
function enemyImageForFloor(floorNumber) {
  let idx = Math.floor((floorNumber - 1) / 10);
  if (idx >= enemyImgs.length - 1) idx = enemyImgs.length - 1;
  return enemyImgs[idx];
}

/* Drawing */
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (let y=0;y<MAP_H;y++){
    for (let x=0;x<MAP_W;x++){
      const t = map[y][x];
      const prog = revealProgress[y][x];
      const isSeen = seen[y][x];
      const isVisible = inVisRange(player.x, player.y, x, y);
      if (!isSeen) {
        ctx.fillStyle = '#000';
        ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        continue;
      }
      if (!isVisible) {
        ctx.fillStyle = (t===TILE.WALL)?'#2a2a2a':'#050505';
        ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        if (t === TILE.POTION) drawDimImage(x,y,potionImg);
        if (t === TILE.STAIRS) drawDimImage(x,y,stairsImg);
        continue;
      }
      const alpha = Math.min(1, prog || 1);
      if (t === TILE.WALL) drawWithAlpha(()=>{ ctx.fillStyle = '#4b4b4b'; ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE); }, alpha);
      else drawWithAlpha(()=>{ ctx.fillStyle = '#0b0b0b'; ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE); }, alpha);
      if (t === TILE.POTION) {
        if (potionImg.complete && potionImg.naturalWidth !== 0) {
          drawWithAlpha(()=>{ ctx.drawImage(potionImg, 0, 0, potionImg.width, potionImg.height, x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE); }, alpha);
        } else drawWithAlpha(()=>{ drawRect(x,y,'#66ff66'); }, alpha);
      } else if (t === TILE.STAIRS) {
        if (stairsImg.complete && stairsImg.naturalWidth !== 0) {
          drawWithAlpha(()=>{ ctx.drawImage(stairsImg, 0, 0, stairsImg.width, stairsImg.height, x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE); }, alpha);
        } else drawWithAlpha(()=>{ drawRect(x,y,'#ffff66'); }, alpha);
      }
    }
  }

  const currentEnemyImg = enemyImageForFloor(floor);
  for (const e of enemies) {
    const isSeen = seen[e.y][e.x];
    if (!isSeen) continue;
    const isVisible = inVisRange(player.x, player.y, e.x, e.y);
    if (isVisible) {
      if (currentEnemyImg.complete && currentEnemyImg.naturalWidth !== 0) {
        ctx.drawImage(currentEnemyImg, 0, 0, currentEnemyImg.width, currentEnemyImg.height, e.x*TILE_SIZE, e.y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
      } else drawCircle(e.x,e.y,'#ff6666');
    } else {
      drawCircle(e.x,e.y,'#5a2a2a');
    }
  }

  if (fighterImg.complete && fighterImg.naturalWidth !== 0) {
    ctx.drawImage(fighterImg, 0, 0, fighterImg.width, fighterImg.height, player.x*TILE_SIZE, player.y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
  } else drawCircle(player.x, player.y, '#66ccff');

  document.getElementById('hpText').textContent = `HP: ${player.hp}/${player.maxHp}`;
  document.getElementById('floorText').textContent = `Floor: ${floor}`;
  document.getElementById('lvText').textContent = `Lv: ${player.baseAtk}`;
  if (!gameOver) {
    const msg = messages.length ? messages[messages.length-1] : 'タッチで操作。';
    document.getElementById('message').textContent = msg;
  }
}

function drawWithAlpha(drawFn, alpha) { ctx.save(); ctx.globalAlpha = alpha; drawFn(); ctx.restore(); }
function drawDimImage(x,y,img){ if (img.complete && img.naturalWidth !== 0) { ctx.save(); ctx.globalAlpha = 0.35; ctx.drawImage(img, 0, 0, img.width, img.height, x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE); ctx.restore(); } else { ctx.fillStyle = '#444'; ctx.fillRect(x*TILE_SIZE+6, y*TILE_SIZE+6, TILE_SIZE-12, TILE_SIZE-12); } }
function drawRect(x,y,color){ ctx.fillStyle = color; ctx.fillRect(x*TILE_SIZE+6, y*TILE_SIZE+6, TILE_SIZE-12, TILE_SIZE-12); }
function drawCircle(x,y,color){ ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x*TILE_SIZE + TILE_SIZE/2, y*TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2 - 4, 0, Math.PI*2); ctx.fill(); }

/* BFS */
function findNextStepBFS(sx,sy,tx,ty) {
  if (sx === tx && sy === ty) return null;
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  const q = [];
  const visited = Array.from({length:MAP_H}, ()=>Array(MAP_W).fill(false));
  const parent = Array.from({length:MAP_H}, ()=>Array(MAP_W).fill(null));
  q.push([sx,sy]);
  visited[sy][sx] = true;
  while (q.length) {
    const [x,y] = q.shift();
    for (const [dx,dy] of dirs) {
      const nx = x+dx, ny = y+dy;
      if (nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) continue;
      if (visited[ny][nx]) continue;
      const tile = map[ny][nx];
      const occupiedByEnemy = enemies.some(e=>e.x===nx && e.y===ny);
      if (tile === TILE.WALL) continue;
      if (occupiedByEnemy && !(nx===tx && ny===ty)) continue;
      visited[ny][nx] = true;
      parent[ny][nx] = [x,y];
      if (nx === tx && ny === ty) {
        let cx = tx, cy = ty;
        let prev = parent[cy][cx];
        while (prev && !(prev[0] === sx && prev[1] === sy)) {
          cx = prev[0]; cy = prev[1];
          prev = parent[cy][cx];
        }
        return [cx,cy];
      }
      q.push([nx,ny]);
    }
  }
  return null;
}

/* SFX */
function playSfx(name) {
  const a = sfx[name];
  if (!a) return;
  try { a.currentTime = 0; a.play().catch(()=>{}); } catch(e){}
}

/* Growth */
function onEnemyKilled() {
  killCount++;
  playSfx('kaishin');
  if (killCount >= nextGrowthThreshold) {
    player.baseAtk += 1;
    player.randomAtk += 1;
    nextGrowthThreshold = killCount + nextThresholdValue();
    playSfx('atkup');
  }
  messages.push('敵を倒した。');
}

/* Game logic */
function inBounds(x,y){ return x>=0 && x<MAP_W && y>=0 && y<MAP_H; }

function startBgmIfNeeded() {
  if (!bgmAutoStarted && !gameOver) {
    bgm.play().catch(()=>{});
    bgmAutoStarted = true;
  }
}

function tryMovePlayer(dx,dy) {
  if (gameOver) return;
  startBgmIfNeeded();
  const nx = player.x + dx, ny = player.y + dy;
  if (!inBounds(nx,ny)) return;
  if (map[ny][nx] === TILE.WALL) { messages.push('壁だ。'); draw(); return; }
  const enemy = enemies.find(e=>e.x===nx && e.y===ny);
  if (enemy) {
    attackEnemy(enemy);
    enemy.chasing = true;
  } else {
    player.x = nx; player.y = ny;
    const tile = map[ny][nx];
    if (tile === TILE.POTION) {
      if (player.hp === player.maxHp) {
        player.maxHp += 1;
        player.hp = player.maxHp;
        messages.push('満タンだったので体力上限が1上がった！');
        playSfx('hpup');
      } else {
        player.hp = Math.min(player.maxHp, player.hp + 5);
        messages.push('回復薬を拾った。HP回復！');
        playSfx('potion');
      }
      map[ny][nx] = TILE.FLOOR;
    } else if (tile === TILE.STAIRS) {
      floor++;
      messages.push(`階段を下りた。フロア ${floor} へ。`);
      player.hp = Math.min(player.maxHp, player.hp + 2);
      playSfx('kaidan');
      generateMap();
      draw();
      return;
    } else {
      messages.push('移動した。');
    }
  }
  revealAround(player.x, player.y);
  enemiesTurn();
  checkPlayerDead();
  draw();
}

/* Attack */
function attackEnemy(enemy) {
  startBgmIfNeeded();
  const rand = Math.floor(Math.random() * (player.randomAtk + 1));
  const dmg = player.baseAtk + rand;
  enemy.hp -= dmg;
  messages.push(`敵に ${dmg} ダメージ！`);
  playSfx('kougeki');
  if (enemy.hp <= 0) {
    enemies = enemies.filter(e=>e!==enemy);
    onEnemyKilled();
  }
}

/* Enemy turn */
function enemiesTurn() {
  const snapshot = enemies.slice();
  const currentEnemyAtk = enemyAtkForFloor(floor);
  for (const e of snapshot) {
    if (!enemies.includes(e)) continue;
    const dx = player.x - e.x, dy = player.y - e.y;
    const manhattan = Math.abs(dx) + Math.abs(dy);

    if (manhattan === 1) {
      const dmg = currentEnemyAtk;
      player.hp -= dmg;
      e.chasing = true;
      messages.push(`敵に ${dmg} ダメージを受けた。`);
      playSfx('tekiatk');
      continue;
    }

    if (e.chasing) {
      const next = findNextStepBFS(e.x, e.y, player.x, player.y);
      if (next) {
        const [nx,ny] = next;
        if (nx === player.x && ny === player.y) {
          const dmg = currentEnemyAtk;
          player.hp -= dmg;
          messages.push(`敵に ${dmg} ダメージを受けた。`);
          playSfx('tekiatk');
        } else {
          if (!enemies.some(o=>o !== e && o.x===nx && o.y===ny)) {
            e.x = nx; e.y = ny;
          }
        }
      } else {
        randomEnemyMove(e);
      }
    } else {
      if (manhattan === 1) {
        e.chasing = true;
        const dmg = currentEnemyAtk;
        player.hp -= dmg;
        messages.push(`敵に ${dmg} ダメージを受けた。`);
        playSfx('tekiatk');
        continue;
      }
      randomEnemyMove(e);
    }
  }
}

function randomEnemyMove(e) {
  const dirs = [[1,0],[-1,0],[0,1],[0,-1],[0,0]];
  const [mx,my] = dirs[Math.floor(Math.random()*dirs.length)];
  const nx = e.x + mx, ny = e.y + my;
  if (inBounds(nx,ny) && map[ny][nx] === TILE.FLOOR && !(nx===player.x && ny===player.y) && !enemies.some(o=>o!==e && o.x===nx && o.y===ny)) {
    e.x = nx; e.y = ny;
  }
}

function checkPlayerDead() {
  if (player.hp <= 0 && !gameOver) {
    gameOver = true;
    messages.push('あなたは倒れた…');
    draw();
    bgm.pause();
    Object.values(sfx).forEach(a=>{ try{ a.pause(); a.currentTime=0; }catch(e){} });
    try { gameoverAudio.currentTime = 0; gameoverAudio.play().catch(()=>{}); } catch(e){}
    showGameOverUI();
  }
}

/* Game over UI */
function evaluatePlayer(reachedFloor) {
  if (reachedFloor >= 100) return '伝説の勇者';
  if (reachedFloor >= 80) return '伝説に近い勇者';
  if (reachedFloor >= 50) return '英雄';
  if (reachedFloor >= 30) return '勇者';
  if (reachedFloor >= 10) return '見習い勇者';
  return '初心者';
}
function showGameOverUI() {
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  document.getElementById('finalFloor').textContent = floor;
  document.getElementById('finalRating').textContent = evaluatePlayer(floor);
  gameOverOverlay.classList.remove('hidden');
}
function hideGameOverUI() {
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  gameOverOverlay.classList.add('hidden');
}

/* Input: keyboard */
window.addEventListener('keydown', (e)=>{
  if (gameOver) return;
  startBgmIfNeeded();
  hideLogoIfVisible();
  const key = e.key;
  if (key === 'ArrowUp' || key === 'w' || key === 'W') { tryMovePlayer(0,-1); e.preventDefault(); }
  else if (key === 'ArrowDown' || key === 's' || key === 'S') { tryMovePlayer(0,1); e.preventDefault(); }
  else if (key === 'ArrowLeft' || key === 'a' || key === 'A') { tryMovePlayer(-1,0); e.preventDefault(); }
  else if (key === 'ArrowRight' || key === 'd' || key === 'D') { tryMovePlayer(1,0); e.preventDefault(); }
  else if (key === ' ') { enemiesTurn(); messages.push('待機した。'); revealAround(player.x, player.y); checkPlayerDead(); draw(); e.preventDefault(); }
});

/* Touch / controller binding */
function bindController() {
  const actions = document.querySelectorAll('[data-action]');
  actions.forEach(btn=>{
    const action = btn.getAttribute('data-action');
    const startHandler = (ev) => {
      ev.preventDefault();
      startBgmIfNeeded();
      hideLogoIfVisible();
      if (action === 'up') tryMovePlayer(0,-1);
      if (action === 'down') tryMovePlayer(0,1);
      if (action === 'left') tryMovePlayer(-1,0);
      if (action === 'right') tryMovePlayer(1,0);
      if (action === 'attack') {
        const enemy = enemies.find(e=>Math.abs(e.x-player.x)+Math.abs(e.y-player.y)===1);
        if (enemy) attackEnemy(enemy);
        else messages.push('攻撃したが敵はいない。');
        enemiesTurn();
        revealAround(player.x, player.y);
        checkPlayerDead();
        draw();
      }
      if (action === 'wait') {
        enemiesTurn();
        messages.push('待機した。');
        revealAround(player.x, player.y);
        checkPlayerDead();
        draw();
      }
    };
    btn.addEventListener('touchstart', startHandler, {passive:false});
    btn.addEventListener('mousedown', startHandler);
  });
}

/* Logo overlay behavior */
let logoAutoHideTimer = null;
function hideLogoIfVisible() {
  if (!logoOverlay || logoOverlay.classList.contains('hidden')) return;
  logoOverlay.classList.add('hidden');
  setTimeout(()=>{ if (logoOverlay && logoOverlay.parentNode) logoOverlay.parentNode.removeChild(logoOverlay); }, 350);
}
function showLogoInitially() {
  logoOverlay.classList.remove('hidden');
  logoAutoHideTimer = setTimeout(()=>{ hideLogoIfVisible(); }, 3000);
  logoOverlay.addEventListener('touchstart', (e)=>{ e.preventDefault(); startBgmIfNeeded(); hideLogoIfVisible(); }, {passive:false});
  logoOverlay.addEventListener('mousedown', (e)=>{ e.preventDefault(); startBgmIfNeeded(); hideLogoIfVisible(); });
}

/* Reset / start */
function resetGame() {
  try { gameoverAudio.pause(); gameoverAudio.currentTime = 0; } catch(e){}
  hideGameOverUI();
  floor = 1;
  player.hp = 10;
  player.maxHp = 10;
  player.baseAtk = 1;
  player.randomAtk = 1;
  killCount = 0;
  messages = [];
  nextGrowthThreshold = nextThresholdValue();
  gameOver = false;
  bgmAutoStarted = false;
  generateMap();
  draw();
  startBgmIfNeeded();
}

/* Retry button */
document.addEventListener('DOMContentLoaded', ()=>{
  const retryBtn = document.getElementById('retryBtn');
  if (retryBtn) {
    retryBtn.addEventListener('click', resetGame);
    retryBtn.addEventListener('touchend', (e)=>{ e.preventDefault(); resetGame(); }, {passive:false});
  }
});

/* Initialization */
function startIfReady(){
  if (assetsLoaded >= allImgs.length) {
    generateMap();
    draw();
    bindController();
    showLogoInitially();
  }
}

/* Start */
startIfReady();
</script>
